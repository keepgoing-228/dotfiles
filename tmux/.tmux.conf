unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

setw -g mode-keys vi
set -g mouse on

# Use Nord colors
# set -g default-terminal "screen-256color"
# set -g status-fg "#2E3440"  # Polar Night variant (medium dark blue-gray)
# set -g status-bg "#88c0d0"  # Frost light blue

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Pevent yank from scolling to the bottom of your buffer after copying.
set -g @yank_action "copy-pipe"

# Selection with mouse should copy to clipboard right away, in addition to the default action.
set -g set-clipboard on
# vi table
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "tmux save-buffer - | yank"
# emacs/normal table
unbind -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "tmux save-buffer - | yank"


# Plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin "tmux-plugins/tmux-yank"
run '~/.tmux/plugins/tpm/tpm'
